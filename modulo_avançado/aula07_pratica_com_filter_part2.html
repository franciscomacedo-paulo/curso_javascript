<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Prática 2 com metodo Filter </title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap');
        *{
            font-family: "Poppins", sans-serif;
            letter-spacing: 0.5px;
            color: #ccc;
        }
        body{
            background-color: #121111;
            width: 100%;
            height: 100vh;
            display: flex;
            gap: 20px;
            justify-content: center;
            align-items: center;
        }
        .caixa{
            border: 2px solid #313030;
            border-radius: 6px;
            box-sizing: border-box;
            padding: 10px;background-color: #323131a8;
            min-width: 400px;
            height: 600px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            overflow: auto;

        }
        .div_input_dado{
            width: 90%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding-inline: 20px;
            padding: 16px;

            & label{
                align-self: flex-start;
                transform: translateX(20px);
                margin-bottom: 10px;
            }

            & input[type="text"]{
                padding: 16px;
                width: 80%;
                border-radius: 6px;
                outline: none;
                border: none;
                color: #121111;
                font-size: 16px;
                font-size: 17px;
                background-color: #313030cd;
                color: #fff;

            }
        }
        .container_btns {
            width:90%;
            margin-top: 26px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            gap: 16px;
            padding: 16px;


            & button{
                padding: 16px;
                width: 80%;
                border-radius: 6px;
                outline: none;
                border: 3px solid #141414;
                color: #121111;
                outline: none;
                font-size: 16px;
                text-transform: uppercase;
                font-weight: 800;
                cursor: pointer;
                
            }
        }
        .cursos{
            width: 80%;
            border: 3px solid rgb(84, 83, 83);
            padding: 10px;
            background-color: rgb(61, 59, 59);
            border-radius: 6px;
            display: flex;
            flex-direction: row;
            justify-content: space-between;
            margin: 10px 0px;
            outline: none;
        }
        input[type="radio"]{
            width: 18px;
            height: 18px;
        }
       
        
    </style>
</head>
<body>
    <div class="caixa" id="caixa_dados">
        <div class="div_input_dado ">
            <label for="curso">Nome do curso</label>
            <input type="text" name="curso" id="curso" required placeholder="digite o nome do curso">
        </div>
        <div class="container_btns">
            <button type="button" id="btn_add_before">Adicionar Antes</button>
            <button type="button" id="btn_add_after">Adicionar Depois</button>
            <button type="button" id="btn_remove_course">Remover Curso</button>
            <button type="button" id="btn_select_course">Curso Selecionado</button>
        </div>
    </div>


    <div class="caixa" id="caixa_cursos">

    </div>



    <script src="./aula07_pratica_com_filter_part2.js"></script>
</body>
</html>
