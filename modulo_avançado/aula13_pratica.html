<!DOCTYPE html>
<html lang="pt-PT">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="author" content="Francisco Macedo" />
    <title>Praticando com Filter, Reduce</title>
    <style type="text/css">
        @import url('https://fonts.googleapis.com/css2?family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&family=Roboto+Slab:wght@100..900&display=swap');
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        font-family: "Poppins", sans-serif;
        letter-spacing: 0.5px;
      }
      body {
        background-color: #121111;
        width: 100%;
        height: 100vh;
        padding: 16px;
      }
      header{
        width: 100%;
        padding: 16px;
        display: flex;
        justify-content: center;
        align-items: center;

        & h1{
          background-image: linear-gradient(45deg, red , blue);
          background-clip: text;
          -webkit-background-clip: text;
          -webkit-text-fill-color: transparent;
          font-size: 40px;

        }
      }
      main{
        width: 100%;
        display: flex;
        flex-direction: column;
        align-items: center;
       
        & div.inputs_entrada{
          width: 100%;
          padding: 16px;
          /* border: 1px solid #504f4f; */
          display: flex;
          justify-content: center;
          align-items: center;
          gap: 16px;
          margin-bottom: 30px;

          & input[type="text"]{
            width: 300px;
            padding: 10px;
            border: none;
            outline: none;
            border-radius: 6px;
            background-color: #222222;
            color: #fff;
            font-size: 16px;
          }

          & button{
            padding: 10px;
            border: none;
            outline: none;
            border-radius: 6px;
            font-size: 16px;
            text-transform: uppercase;
            font-weight: 600;
            cursor: pointer;
            background-color: rgb(10, 158, 199);
            color: #cac6c6;
          }
        }

        & div.result_display{
          width: 100%;
          min-height: 500px;
          border-radius: 6px;
          padding: 16px;
          border: 1px solid #787777;


        }
      }
    </style>
  </head>
  <body>
    <header>
      <h1>Buscando produto</h1>
    </header>
    <main>
      <div class="inputs_entrada">
        <input
          type="text"
          name="produto"
          id="produto"
          placeholder="pesquise pelo produto aqui..."
          required
        />
        <button type="button" id="btn_pesquisar">Pesquisar</button>
      </div>
      <div class="result_display">

      </div>
    </main>
  </body>
  <script src="./aula13_pratica.js"></script>
</html>
