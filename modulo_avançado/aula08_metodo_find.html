<!DOCTYPE html>
<html lang="pt-PT">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="author" content="Francisco Macedo">
    <title>Método Find JavaScript</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap');
        *{
            padding: 0;
            margin: 0;
            box-sizing: border-box;
            font-family: "Poppins", sans-serif;
            letter-spacing: 0.5px;
        }
        body{
            background-color: #121111;
            color: #ccc;   
            width: 100%;
            height: 100vh;
            padding: 20px;
        }
        .mostrar_arr{
            width: 100%;
            border: 5px solid tomato;
            border-radius: 6px;
            padding: 10px;
            margin-bottom: 10px;
            background-color: rgb(46, 46, 45);
            display: flex;
            align-items: center;
            column-gap: 4px;

            & #arr{
                background-color: #121111;
                width: 100%;
                height: 40px;
                color: #ccc;
                display: flex;
                align-items: center;
                border-radius: 4px;
                text-indent: 20px;
            }

        }
        .array_pesquisar{
            width: 100%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            border: 5px solid rgb(199, 102, 4);
            border-radius: 6px;
            padding: 10px;
            gap: 10px;
            background-color: #23201b;
            margin-bottom: 10px;

            & input[type="search"]{
                width: 300px;
                padding: 10px;
                outline:none ;
                border: 1px solid #ccc;
                height: 46px;
                border-radius: 6px;
                background-color: #353330;
                color: #ccc;
                font-size: 18px;
            }
            & button{
                width: 150px;
                padding: 10px;
                border: none;
                outline: none;
                border-radius: 6px;
                cursor: pointer;
                font-size: 17px;
                text-transform: uppercase;
                font-weight: 700;
                background-color: rgb(5, 175, 5);
                color: #fff;
            }
            & #alert_message{
                color: darkred;
                display: none;
            }

        }
        .result{
            width: 100%;
            border: 5px solid darkred;
            border-radius: 6px;
            padding: 10px;
            display: flex;
            align-items: center;
            gap: 10px;
            background-color: darkred;

            & #result{
                background-color: #121111;
                width: 100%;
                height: 40px;
                color: #ccc;
                display: flex;
                align-items: center;
                border-radius: 4px;
                text-indent: 20px;
            }
        }
        
    </style>
</head>
<body>
    <div class="mostrar_arr d">
        <p>Array:</p>
        <p id="arr"></p>
    </div>

    <div class="array_pesquisar">
        <label for="pesqui">Pesquisar por:</label>
        <input type="search" name="pesqui" id="pesqui" required placeholder="pesquise algo..." autocomplete="off">
        <span id="alert_message">Digite algo primeiro no campo acima!</span>
        <button type="button" id="btn_pesquisa">Search</button>
    </div>

    <div class="result">
        <p>Resultado:</p>
        <p id="result"></p>
    </div>

</body>

    <script src="./aula08_metodo_find.js"></script>
</html>
