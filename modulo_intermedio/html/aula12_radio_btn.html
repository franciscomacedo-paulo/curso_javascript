<!DOCTYPE html>
<html lang="pt-PT">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Radio Button</title>
    <style type="text/css">
        *{
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body{
            background-color: #121111;
            width: 100%;
            height: 100vh;

        }
        header{
            width: 100%;
            padding: 16px;
            display: flex;
            justify-content: center;
            align-items: center;

            & h1{
                background: linear-gradient(45deg, red, blue);
                background-clip: text;
                -webkit-background-clip: text;
                -webkit-text-fill-color: transparent;
                color: #ccc;
                font-size: 40px;
            }
        }
        main{
            width: 100%;
            max-width: 1200px;
            margin:  0 auto;
            border: 1px solid #ccc;
            border-radius: 6px;
             
            & section{
                width: 100%;
                padding: 16px;
            }
        }
        section.radio_conteiner{
            display: flex;
            justify-content: center;
            flex-wrap: wrap;
            gap: 10px;

            & div{
                display: flex;
                justify-content: center;
                align-items: center;

                & input{
                    width: 18px;
                    height: 18px;
                    margin-right: 6px;
                    cursor: pointer;
                }
                & label{
                    color: #919090;
                    font-size: 18px;
                }
            }
        }
        section.entrada_dados{
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 10px;
            
            & input{
                padding: 10px;
                border: none;
                outline: none;
                width: 100%;
                max-width: 200px;
                border-radius: 6px;
                background-color: #414040;
                color: #ccc;
                font-size: 16px;
            }

        }
        section.conteiner_btn{
            display: flex;
            justify-content: center;
            align-items: center;

            & button{
                padding: 10px;
                border: none;
                outline: none;
                width: 100%;
                max-width: 250px;
                text-transform: uppercase;
                font-size: 16px;
                font-weight: 700;
                letter-spacing: 0.5px;
                border-radius: 6px;
                background: linear-gradient(.25turn, lightgreen, cyan);
            }
        }
        section.result{
            display: flex;
            justify-content: center;
            align-items: center;

            & p{
                color: #ccc;
                font-size: 18px;

                & span{
                    color: #ccc;
                    margin-left: 10px;
                    font-size: 18px;
                }
            }
        }

    </style>
</head>
<body>
    <header>
        <h1>Radio Button</h1>
    </header>
    <main>
        <section class="radio_conteiner">
            <div>
                <input type="radio" name="calculo" id="soma" value="Soma">
                <label for="soma">Soma</label>
            </div>
            <div>
                <input type="radio" name="calculo" id="subtracao" value="Subtração">
                <label for="subtracao">Subtração</label>
            </div>
            <div>
                <input type="radio" name="calculo" id="multiplicar" value="Multiplicar">
                <label for="multiplicar">multiplicar</label>
            </div>
            <div>
                <input type="radio" name="calculo" id="divisao" value="Divisão">
                <label for="divisao">Divisão</label>
            </div>
            <div>
                <input type="radio" name="calculo" id="resto" value="Resto">
                <label for="soma">Resto da divisão</label>
            </div>
        </section>

        <section class="entrada_dados">
            <input type="number" name="valor1" id="valor1" placeholder="digite o primeiro valor..." required step="0.5">
            <input type="number" name="valor2" id="valor2" placeholder="digite o segundo valor..." required step="0.5">
        </section>
        <section class="conteiner_btn">
            <button type="button" id="btn">Calcular</button>
        </section>

        <section class="result">
            <p>O resultado do calculo: <span id="result"></span></p>
        </section>
    </main>
    

    <script src="../aula12_radio_btn.js"></script>
</body>
</html>
